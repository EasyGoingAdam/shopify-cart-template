name = "cart-template"
client_id = "your-shopify-api-key-here"
application_url = "https://your-app-url.railway.app"
embedded = true

[build]
  automatically_update_urls_on_dev = true
  dev_store_url = ""
  include_config_on_deploy = true

[access_scopes]
  # Learn more at https://shopify.dev/docs/apps/tools/cli/configuration
  scopes = "read_products,write_draft_orders,read_draft_orders,read_customers,write_customers"

[auth]
  redirect_urls = [
    "https://your-app-url.railway.app/auth/callback",
    "https://your-app-url.railway.app/auth/shopify/callback",
    "https://your-app-url.railway.app/api/auth/callback"
  ]

[webhooks]
  api_version = "2025-01"

  [[webhooks.subscriptions]]
    topics = ["app/uninstalled"]
    uri = "/webhooks"

[pos]
  embedded = false
